<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    
    <!-- Fonts with display swap for better performance -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- SEO Meta Tags -->
    <title>GoFlow AI | Save 15+ Hours Weekly with AI Business Automation</title>
    <meta name="description" content="Transform your business with AI automation. Save 15+ hours weekly, increase bookings by 34%, and get ROI in 30 days. Free strategy session available.">
    <meta name="author" content="GoFlow AI" />
    <meta name="keywords" content="AI automation, business automation, AI chatbot, CRM automation, booking automation, lead generation, Australia, Ecuador, Chile">
    <link rel="canonical" href="https://goflowai.com/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://goflowai.com/" />
    <meta property="og:title" content="GoFlow AI | Save 15+ Hours Weekly with AI Business Automation">
    <meta property="og:description" content="Transform your business with AI automation. Save 15+ hours weekly, increase bookings by 34%, and get ROI in 30 days.">
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/hUA2srj6DhhqZoyRq2f3uSxIDC73/social-images/social-1763447313586-Logo sin BG.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@GoFlowAI" />
    <meta name="twitter:title" content="GoFlow AI | Save 15+ Hours Weekly with AI Business Automation">
    <meta name="twitter:description" content="Transform your business with AI automation. Save 15+ hours weekly, increase bookings by 34%, and get ROI in 30 days.">
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/hUA2srj6DhhqZoyRq2f3uSxIDC73/social-images/social-1763447313586-Logo sin BG.png">
    
    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "GoFlow AI",
      "description": "AI-powered business automation for service-based businesses",
      "url": "https://goflowai.com",
      "logo": "https://storage.googleapis.com/gpt-engineer-file-uploads/hUA2srj6DhhqZoyRq2f3uSxIDC73/social-images/social-1763447313586-Logo sin BG.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Sales",
        "availableLanguage": ["English", "Spanish"]
      },
      "areaServed": ["Australia", "Ecuador", "Chile"],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "100"
      }
    }
    </script>
    
    <!-- Structured Data - Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "AI Business Automation",
      "provider": {
        "@type": "Organization",
        "name": "GoFlow AI"
      },
      "description": "AI-powered automation systems for clinics, wellness centers, and service-based businesses",
      "offers": {
        "@type": "Offer",
        "availability": "https://schema.org/InStock",
        "priceSpecification": {
          "@type": "PriceSpecification",
          "priceCurrency": "AUD"
        }
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
